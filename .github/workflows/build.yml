name: Build Dodot

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential scons pkg-config libx11-dev libxcursor-dev \
            libxinerama-dev libgl1-mesa-dev libglu1-mesa-dev libasound2-dev libpulse-dev \
            libdbus-1-dev libudev-dev libxi-dev libxrandr-dev libwayland-dev libxkbcommon-dev
      - name: Build editor
        run: scons platform=linuxbsd target=editor module_mcp_server_enabled=yes module_gdtest_enabled=yes -j$(nproc)
      - name: Run CLI tests
        run: |
          cd demo
          ../bin/godot.linuxbsd.editor.x86_64 --headless --path . --validate-scripts
          ../bin/godot.linuxbsd.editor.x86_64 --headless --path . --run-tests
          ../bin/godot.linuxbsd.editor.x86_64 --headless --path . --project-info
          ../bin/godot.linuxbsd.editor.x86_64 --headless --path . --lint-gdscript
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dodot-linux-x86_64
          path: bin/godot.linuxbsd.editor.x86_64

  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: brew install scons
      - name: Build editor
        run: scons platform=macos target=editor module_mcp_server_enabled=yes module_gdtest_enabled=yes vulkan=no -j$(sysctl -n hw.logicalcpu)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dodot-macos
          path: bin/godot.macos.editor.*

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install scons
      - name: Build editor
        shell: bash
        run: scons platform=windows target=editor module_mcp_server_enabled=yes module_gdtest_enabled=yes d3d12=no accesskit=no -j$NUMBER_OF_PROCESSORS
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dodot-windows-x86_64
          path: bin/godot.windows.editor.x86_64.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, macos, windows]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dodot-linux-x86_64/*
            dodot-macos/*
            dodot-windows-x86_64/*
          generate_release_notes: true
